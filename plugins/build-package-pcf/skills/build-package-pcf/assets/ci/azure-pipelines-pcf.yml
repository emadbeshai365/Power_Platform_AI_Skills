trigger:
  branches:
    include: [main]

pool:
  vmImage: windows-latest

variables:
  componentPath: src/MyControl
  solutionProject: solutions/MySolution/MySolution.cdsproj
  pcfHosts: model-driven,canvas

steps:
  - checkout: self
    clean: true
  - task: NodeTool@0
    inputs:
      versionSpec: 20.x
  - task: UseDotNet@2
    inputs:
      packageType: sdk
      version: 8.x
  - script: npm ci
    displayName: Restore locked dependencies
    workingDirectory: $(componentPath)
  - script: node tools/build-package-pcf/scripts/inspect-pcf-project.mjs "$(componentPath)" --hosts "$(pcfHosts)" --json
    displayName: Audit PCF contract and host compatibility
  - script: npm run lint --if-present
    displayName: Lint
    workingDirectory: $(componentPath)
  - script: npm run test --if-present
    displayName: Test
    workingDirectory: $(componentPath)
  - script: npm run build -- --buildMode production
    displayName: Build production bundle
    workingDirectory: $(componentPath)
  - script: dotnet build "$(solutionProject)" --configuration Release
    displayName: Build Release solution
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: $(Build.SourcesDirectory)/solutions
      artifact: pcf-solution-output
